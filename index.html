<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Whale Delivery Clock Widget</title>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .widget {
      width: 96%; 
      height: 94%;
      border-radius: 24px; 
      background: linear-gradient(to top right, #bae6fd, #eff6ff, #a7f3d0);
      padding: 22px;
      color: #0f172a;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      border: 1px solid #e2e8f0;
    }

    .greeting, .whale-tag { 
      font-family: 'Gowun Dodum', sans-serif;
    }

    .greeting { 
      font-size: 13px; 
      font-weight: 700; 
      color: #0369a1; 
      z-index: 30; 
    }
    
    .content-box {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      flex-grow: 1;
      z-index: 30;
    }
    
    .time-wrapper, .date {
      font-family: "Pretendard", -apple-system, sans-serif;
    }

    .time-wrapper {
      font-size: 44px; 
      font-weight: 700;
      letter-spacing: -0.03em; 
      color: #0c4a6e; 
      display: flex;
      align-items: center; 
      line-height: 1;
    }
    
    .colon { 
      animation: blink 1.2s infinite; 
      margin: 0 2px;
      padding-bottom: 6px; 
    }
    
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.1; } }
    
    .date { 
      font-size: 13px; 
      font-weight: 500;
      color: #334155; 
      margin-top: 4px; 
      letter-spacing: -0.02em;
    }
    
    .whale-tag { 
      position: absolute; 
      left: 22px; 
      bottom: 16px; 
      font-size: 11px; 
      font-weight: 700;
      color: #0369a1; 
      z-index: 30; 
      display: flex; 
      align-items: center; 
      gap: 6px; 
    }
    
    /* 🐋 고래 아이콘이 부드럽게 위아래로 둥둥 뜨는 효과 */
    .whale-icon {
      width: 22px;
      height: 22px;
      object-fit: contain;
      animation: floatWhale 3s infinite ease-in-out;
    }
    @keyframes floatWhale {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    /* 🧼 퐁퐁 솟아오르는 리얼 물방울(버블) 레이어 */
    .bubble-layer { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
    .bubble {
      position: absolute;
      bottom: -20px; /* 화면 아래에서 출발 */
      background: rgba(255, 255, 255, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.6); /* 투명한 비누방울 테두리 */
      border-radius: 50%;
      animation: riseUp var(--duration) infinite linear;
    }
    
    /* 🛠️ 위로 퐁퐁 솟구치며 좌우로 일렁이는 역동적인 애니메이션 */
    @keyframes riseUp {
      0% {
        transform: translateY(0) translateX(0) scale(0.6);
        opacity: 0;
      }
      10% {
        opacity: 0.8;
      }
      50% {
        /* 중간쯤 갔을 때 좌측으로 살짝 흔들림 */
        transform: translateY(-50vh) translateX(-15px) scale(1);
      }
      90% {
        opacity: 0.8;
      }
      100% {
        /* 위로 다 올라가서 퐁! 터지며 사라짐 */
        transform: translateY(-110vh) translateX(10px) scale(0.8);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="widget">
    <!-- 물방울 레이어로 변경 -->
    <div class="bubble-layer" id="bubbleLayer"></div>
    <div class="greeting" id="greetingText">안녕, 고래의 시간이에요</div>
    <div class="content-box">
      <div class="time-wrapper">
        <span id="hourText">00</span><span class="colon">:</span><span id="minText">00</span>
      </div>
      <div id="dateText" class="date"></div>
    </div>
    <div class="whale-tag">
      <!-- 🐋 점 대신 실제 whale_m.gif 아이콘이 둥둥 뜨게 배치 -->
      <img src="whale_m.gif" alt="whale" className="whale-icon" />
      <span>whale carrier clock</span>
    </div>
  </div>

  <script>
    // 🛠️ 랜덤하게 크기와 속도가 다른 물방울 퐁퐁 생성 스크립트
    const bubbleLayer = document.getElementById('bubbleLayer');
    const bubbleCount = 20; // 화면에 떠다닐 물방울 개수

    for (let i = 0; i < bubbleCount; i++) {
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      
      // 물방울 크기를 4px에서 12px까지 다양하게 세팅해서 입체감 부여
      const size = Math.random() * 8 + 4;
      bubble.style.width = size + 'px';
      bubble.style.height = size + 'px';
      
      // 가로 위치 랜덤 배치
      bubble.style.left = Math.random() * 100 + '%';
      
      // 솟아오르는 속도 다르게 세팅 (6초 ~ 11초 사이)
      bubble.style.setProperty('--duration', (Math.random() * 5 + 6) + 's');
      
      // 출발 시간 분산시켜서 끊기지 않고 연속으로 퐁퐁 나옴
      bubble.style.animationDelay = Math.random() * 8 + 's';
      
      bubbleLayer.appendChild(bubble);
    }

    function updateClock() {
      const now = new Date();
      const h = now.getHours();
      const m = now.getMinutes();
      const hourDisplay = h % 12 || 12;
      
      document.getElementById("hourText").textContent = hourDisplay;
      document.getElementById("minText").textContent = m < 10 ? "0" + m : m;
      
      const days = ["일", "월", "화", "수", "목", "금", "토"];
      const dateStr = `${now.getFullYear()}.${now.getMonth() + 1}.${now.getDate()}(${days[now.getDay()]})`;
      document.getElementById("dateText").textContent = dateStr;

      let g = "포근한 밤, 오늘도 뜨개 수고하셨어요 🌌";
      if (h >= 5 && h < 11) g = "기분 좋은 아침, 코 늘리러 가볼까요? 🧶";
      else if (h >= 11 && h < 17) g = "나른한 오후, 차 한 잔과 즐거운 뜨개 타임 ☕";
      else if (h >= 17 && h < 21) g = "노을빛 바다, 배달원이 도안 대기 중이에요 ✨";
      document.getElementById("greetingText").textContent = g;
    }
    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
