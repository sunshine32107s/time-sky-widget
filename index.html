<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Whale Delivery Clock Widget</title>
  <!-- 인사말과 날짜는 귀여운 고운돋움을 유지하기 위해 링크 배치 -->
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum:wght@400;700&display=swap" rel="stylesheet" />
  <!-- 시간 전용 폰트로 Pretendard 복원 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .widget {
      width: 96%; 
      height: 94%;
      border-radius: 24px; 
      background: linear-gradient(to top right, #bae6fd, #eff6ff, #a7f3d0);
      padding: 22px;
      color: #0f172a;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      border: 1px solid #e2e8f0;
    }

    /* 인사말과 하단 태그는 고운돋움 폰트 유지 */
    .greeting, .whale-tag { 
      font-family: 'Gowun Dodum', sans-serif;
    }

    .greeting { 
      font-size: 13px; 
      font-weight: 700; 
      color: #0369a1; 
      z-index: 30; 
    }
    
    .content-box {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      flex-grow: 1;
      z-index: 30;
    }
    
    /* 🛠️ 시간과 날짜는 원래 타임 위젯의 Pretendard 폰트 및 크기(44px)로 완벽 복원 */
    .time-wrapper, .date {
      font-family: "Pretendard", -apple-system, sans-serif;
    }

    .time-wrapper {
      font-size: 44px; /* 원래 시계의 황금 크기로 조정 */
      font-weight: 700;
      letter-spacing: -0.03em; /* 원래 시계의 자간 복원 */
      color: #0c4a6e; 
      display: flex;
      align-items: center; 
      line-height: 1;
    }
    
    .colon { 
      animation: blink 1.2s infinite; 
      margin: 0 2px;
      padding-bottom: 6px; /* 원래 시계의 땡땡이 위치 정렬 마진 복원 */
    }
    
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.1; } }
    
    .date { 
      font-size: 13px; 
      font-weight: 500;
      color: #334155; 
      margin-top: 4px; /* 원래 시계 마진 복원 */
      letter-spacing: -0.02em;
    }
    
    .whale-tag { 
      position: absolute; 
      left: 22px; 
      bottom: 20px; 
      font-size: 11px; 
      font-weight: 700;
      color: #0369a1; 
      z-index: 30; 
      display: flex; 
      align-items: center; 
      gap: 6px; 
    }
    
    .whale-dot { 
      width: 7px; 
      height: 7px; 
      border-radius: 50%; 
      background: #0ea5e9; 
      box-shadow: 0 0 6px #0ea5e9; 
    }

    /* 바다 물방울 반짝이 레이어 */
    .star-layer { position: absolute; inset: 0; z-index: 1; }
    .star {
      position: absolute;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 50%;
      opacity: 0;
      animation: twinkle var(--duration) infinite ease-in-out;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.4) translateY(0px); }
      50% { opacity: 0.9; transform: scale(1.1) translateY(-5px); }
    }
  </style>
</head>
<body>
  <div class="widget">
    <div class="star-layer" id="starLayer"></div>
    <div class="greeting" id="greetingText">안녕, 고래의 시간이에요</div>
    <div class="content-box">
      <div class="time-wrapper">
        <span id="hourText">00</span><span class="colon">:</span><span id="minText">00</span>
      </div>
      <div id="dateText" class="date"></div>
    </div>
    <div class="whale-tag">
      <div class="whale-dot"></div>
      <span>whale carrier clock</span>
    </div>
  </div>

  <script>
    const starLayer = document.getElementById('starLayer');
    for (let i = 0; i < 25; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      const size = Math.random() * 3 + 1;
      star.style.width = size + 'px';
      star.style.height = size + 'px';
      star.style.top = Math.random() * 100 + '%';
      star.style.left = Math.random() * 100 + '%';
      star.style.setProperty('--duration', (Math.random() * 4 + 3) + 's');
      star.style.animationDelay = Math.random() * 4 + 's';
      starLayer.appendChild(star);
    }

    function updateClock() {
      const now = new Date();
      const h = now.getHours();
      const m = now.getMinutes();
      const hourDisplay = h % 12 || 12;
      
      // 🛠️ 시간 표시에 앞에 "0"이 붙지 않도록 문자열 변환 로직 제거 (숫자 그대로 노출)
      document.getElementById("hourText").textContent = hourDisplay;
      // 분(Minute)은 시계 규칙상 0이 유지되어야 정상적으로 보입니다 (예: 3시 5분 -> 3:05)
      document.getElementById("minText").textContent = m < 10 ? "0" + m : m;
      
      const days = ["일", "월", "화", "수", "목", "금", "토"];
      const dateStr = `${now.getFullYear()}.${now.getMonth() + 1}.${now.getDate()}(${days[now.getDay()]})`;
      document.getElementById("dateText").textContent = dateStr;

      let g = "포근한 밤, 오늘도 뜨개 수고하셨어요 🌌";
      if (h >= 5 && h < 11) g = "기분 좋은 아침, 코 늘리러 가볼까요? 🧶";
      else if (h >= 11 && h < 17) g = "나른한 오후, 차 한 잔과 즐거운 뜨개 타임 ☕";
      else if (h >= 17 && h < 21) g = "노을빛 바다, 배달원이 도안 대기 중이에요 ✨";
      document.getElementById("greetingText").textContent = g;
    }
    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
