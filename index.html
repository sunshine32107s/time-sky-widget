<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Whale Delivery Clock Widget</title>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Gowun Dodum', sans-serif;
      background: transparent; /* 노션 임베드 칸에 자연스럽게 얹어지도록 투명 처리 */
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .widget {
      width: 96%; 
      height: 94%;
      border-radius: 24px; 
      /* 🎨 배달원 웹사이트와 100% 일치하는 파스텔톤 그라데이션 주입 */
      background: linear-gradient(to top right, #bae6fd, #eff6ff, #a7f3d0);
      padding: 22px;
      /* 글자색을 선명하고 짙은 슬레이트 딥블루로 변경하여 가독성 강화 */
      color: #0f172a;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      border: 1px solid #e2e8f0;
    }

    /* 텍스트 요소 최적화 */
    .greeting { 
      font-size: 13px; 
      font-weight: 700; 
      color: #0369a1; /* 스카이블루 딥 톤 */
      z-index: 30; 
    }
    
    .content-box {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      flex-grow: 1;
      z-index: 30;
    }
    
    .time-wrapper {
      font-size: 46px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #0c4a6e; /* 깊은 고래 블루 */
      display: flex;
      align-items: center; 
      line-height: 1;
    }
    
    .colon { 
      animation: blink 1.2s infinite; 
      margin: 0 1px;
      padding-bottom: 4px; 
    }
    
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.1; } }
    
    .date { 
      font-size: 13px; 
      font-weight: 700;
      color: #334155; 
      margin-top: 6px;
      letter-spacing: -0.01em;
    }
    
    .whale-tag { 
      position: absolute; 
      left: 22px; 
      bottom: 20px; 
      font-size: 11px; 
      font-weight: 700;
      color: #0369a1; 
      z-index: 30; 
      display: flex; 
      align-items: center; 
      gap: 6px; 
    }
    
    .whale-dot { 
      width: 7px; 
      height: 7px; 
      border-radius: 50%; 
      background: #0ea5e9; 
      box-shadow: 0 0 6px #0ea5e9; 
    }

    /* 바다 물방울 반짝이 레이어 */
    .star-layer { position: absolute; inset: 0; z-index: 1; }
    .star {
      position: absolute;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 50%;
      opacity: 0;
      animation: twinkle var(--duration) infinite ease-in-out;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.4) translateY(0px); }
      50% { opacity: 0.9; transform: scale(1.1) translateY(-5px); }
    }
  </style>
</head>
<body>
  <div class="widget">
    <div class="star-layer" id="starLayer"></div>
    <div class="greeting" id="greetingText">안녕, 고래의 시간이에요</div>
    <div class="content-box">
      <div class="time-wrapper">
        <span id="hourText">00</span><span class="colon">:</span><span id="minText">00</span>
      </div>
      <div id="dateText" class="date"></div>
    </div>
    <div class="whale-tag">
      <div class="whale-dot"></div>
      <span>whale carrier clock</span>
    </div>
  </div>

  <script>
    const starLayer = document.getElementById('starLayer');
    for (let i = 0; i < 25; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      const size = Math.random() * 3 + 1;
      star.style.width = size + 'px';
      star.style.height = size + 'px';
      star.style.top = Math.random() * 100 + '%';
      star.style.left = Math.random() * 100 + '%';
      star.style.setProperty('--duration', (Math.random() * 4 + 3) + 's');
      star.style.animationDelay = Math.random() * 4 + 's';
      starLayer.appendChild(star);
    }

    function updateClock() {
      const now = new Date();
      const h = now.getHours();
      const m = now.getMinutes();
      const hourDisplay = h % 12 || 12;
      document.getElementById("hourText").textContent = hourDisplay < 10 ? "0" + hourDisplay : hourDisplay;
      document.getElementById("minText").textContent = m < 10 ? "0" + m : m;
      const days = ["일", "월", "화", "수", "목", "금", "토"];
      const dateStr = `${now.getFullYear()}.${now.getMonth() + 1}.${now.getDate()}(${days[now.getDay()]})`;
      document.getElementById("dateText").textContent = dateStr;

      // 🧶 고래 도안 배달원 전용 아기자기한 멘트 세팅
      let g = "포근한 밤, 오늘도 뜨개 수고하셨어요 🌌";
      if (h >= 5 && h < 11) g = "기분 좋은 아침, 코 늘리러 가볼까요? 🧶";
      else if (h >= 11 && h < 17) g = "나른한 오후, 차 한 잔과 즐거운 뜨개 타임 ☕";
      else if (h >= 17 && h < 21) g = "노을빛 바다, 배달원이 도안 대기 중이에요 ✨";
      document.getElementById("greetingText").textContent = g;
    }
    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
